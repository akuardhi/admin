<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA | Premium Digital Store</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- GSAP & Lenis -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
</head>
<body>

    <!-- Smooth Scroll Wrapper -->
    <div id="app-wrapper">
        
        <!-- Navigation -->
        <nav>
            <div class="nav-container">
                <div class="logo">ULTRA<span>STORE</span></div>
                <div class="nav-actions">
                    <button id="adminBtn" class="btn-icon"><i data-lucide="layout-dashboard"></i> Dashboard</button>
                </div>
            </div>
        </nav>

        <!-- Main Storefront -->
        <main id="storefront">
            <header class="hero">
                <h1 class="animate-text">Premium Account <br> Solutions.</h1>
                <p class="animate-text">Akses instan ke aplikasi premium terbaik dunia dengan harga terjangkau.</p>
            </header>

            <section class="products-section">
                <div id="productGrid" class="product-grid">
                    <!-- Products will be injected here -->
                </div>
            </section>
        </main>

        <!-- Admin Dashboard (Hidden by Default) -->
        <section id="dashboard" class="hidden">
            <div class="dashboard-container">
                <div class="dash-header">
                    <h2>Store Manager</h2>
                    <button id="closeAdmin" class="btn-close">Kembali ke Toko</button>
                </div>
                
                <div class="dash-grid">
                    <div class="form-card">
                        <h3>Tambah Produk Baru</h3>
                        <form id="productForm">
                            <div class="input-group">
                                <label>Nama Aplikasi</label>
                                <input type="text" id="pName" placeholder="Contoh: Netflix UHD" required>
                            </div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label>Harga (IDR)</label>
                                    <input type="text" id="pPrice" placeholder="25.000" required>
                                </div>
                                <div class="input-group">
                                    <label>Stok</label>
                                    <input type="number" id="pStock" placeholder="99" required>
                                </div>
                            </div>
                            <div class="input-group">
                                <label>Link Logo (URL atau Upload)</label>
                                <input type="text" id="pLogo" placeholder="https://link-image.com/logo.png">
                            </div>
                            <button type="submit" class="btn-primary">Simpan ke Katalog</button>
                        </form>

                        <div class="qris-manager">
                            <h3>Pengaturan QRIS</h3>
                            <input type="file" id="qrisUpload" hidden>
                            <button onclick="document.getElementById('qrisUpload').click()" class="btn-secondary">Upload QRIS Baru</button>
                        </div>
                    </div>

                    <div class="list-card">
                        <h3>Inventaris</h3>
                        <div id="adminProductList"></div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div id="qrisContainer">
                <h2 id="modalAppName">Premium App</h2>
                <p id="modalPrice">Rp 0</p>
                <div class="qris-image-wrapper">
                    <img id="qrisImg" src="" alt="Scan QRIS">
                </div>
                <p class="qris-hint">Scan untuk membayar. Proses aktivasi otomatis 5-10 menit.</p>
                <button class="btn-primary" onclick="closeModal()">Konfirmasi Selesai</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
